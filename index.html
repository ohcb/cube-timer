<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cube Timer MVP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="topbar">
        <div class="brand"><h1>Cube Timer</h1><span>click anywhere · Space</span></div>
        <div class="controls" data-ignore-timer>
          <label>Event<select id="eventSelect"></select></label>
          <label>Session<select id="sessionSelect"></select></label>
          <button id="newSessionButton" type="button">새 세션</button>
          <button id="newScrambleButton" type="button">새 스크램블</button>
        </div>
      </header>

      <main class="timer-zone idle" id="timerZone" aria-live="polite">
        <div>
          <div class="timer-state" id="timerState">IDLE</div>
          <p class="timer-display" id="timerDisplay">0.00</p>
          <p class="timer-help" id="timerHelp">클릭하면 READY, 잠시 후 자동 시작됩니다. 실행 중 클릭하면 정지합니다.</p>
        </div>
      </main>

      <p class="scramble" id="scrambleText"></p>

      <section class="dashboard" data-ignore-timer>
        <article class="panel">
          <h2>통계</h2>
          <div class="stats">
            <div class="stat"><span>Single PB</span><strong id="pbSingle">-</strong></div>
            <div class="stat"><span>Ao5 PB</span><strong id="pbAo5">-</strong></div>
            <div class="stat"><span>Ao5</span><strong id="ao5">-</strong></div>
            <div class="stat"><span>Ao12</span><strong id="ao12">-</strong></div>
            <div class="stat"><span>Ao50</span><strong id="ao50">-</strong></div>
            <div class="stat"><span>Ao100</span><strong id="ao100">-</strong></div>
          </div>
        </article>

        <article class="panel wide">
          <h2>기록 추이</h2>
          <canvas id="trendCanvas" width="760" height="250"></canvas>
        </article>

        <article class="panel">
          <h2>기록 분포</h2>
          <div class="distribution" id="distributionBars"></div>
        </article>

        <article class="panel wide">
          <h2>기록 목록 <span id="solveCount" class="empty"></span></h2>
          <ol class="history" id="historyList"></ol>
        </article>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
